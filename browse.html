<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Cars — REIA Motors</title>
  <meta name="description" content="Browse quality used vehicles in Aruba. Filter by body type, fuel, transmission, price, and year." />
  <link rel="stylesheet" href="browse.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAV -->
  <nav id="siteNav" class="nav-solid">
    <div class="nav-logo">REIA</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html" class="active">Browse Cars</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-burger" id="navBurger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE NAV -->
  <div class="nav-mobile" id="navMobile">
    <a href="index.html">Home</a>
    <a href="browse.html" class="active">Browse Cars</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- PAGE -->
  <main class="browse-page">
    <div class="browse-container">

      <div class="browse-layout">

        <!-- Left column: header + filters -->
        <aside class="filters">
          <!-- Page header -->
          <div class="browse-head">
            <p class="label">INVENTORY</p>
            <h1>Browse Cars</h1>
            <p class="browse-count"><span id="countText">0</span> vehicle(s) found</p>
          </div>
          <form class="filters-card" id="filtersForm">

            <div class="f-group">
              <label for="q">Search</label>
              <input id="q" name="q" placeholder="Toyota, Jeep, 2020…" />
            </div>

            <div class="f-group">
              <label for="body">Body type</label>
              <select id="body" name="body">
                <option value="">Any</option>
                <option value="SUV">SUV</option>
                <option value="Sedan">Sedan</option>
                <option value="Hatchback">Hatchback</option>
                <option value="Truck">Truck</option>
                <option value="Van">Van</option>
                <option value="Motorcycle">Motorcycle</option>
              </select>
            </div>

            <div class="f-group">
              <label for="fuel">Fuel</label>
              <select id="fuel" name="fuel">
                <option value="">Any</option>
                <option value="Gasoline">Gasoline</option>
                <option value="Diesel">Diesel</option>
                <option value="Hybrid">Hybrid</option>
                <option value="Electric">Electric</option>
              </select>
            </div>

            <div class="f-group">
              <label for="trans">Transmission</label>
              <select id="trans" name="trans">
                <option value="">Any</option>
                <option value="Automatic">Automatic</option>
                <option value="Manual">Manual</option>
              </select>
            </div>

            <div class="f-group">
              <label>Price range (AWG)</label>
              <div class="f-row">
                <input id="minPrice" name="minPrice" inputmode="numeric" placeholder="Min" />
                <input id="maxPrice" name="maxPrice" inputmode="numeric" placeholder="Max" />
              </div>
            </div>

            <div class="f-group">
              <label>Year</label>
              <div class="f-row">
                <input id="minYear" name="minYear" inputmode="numeric" placeholder="From" />
                <input id="maxYear" name="maxYear" inputmode="numeric" placeholder="To" />
              </div>
            </div>

            <button class="btn-gradient f-apply" type="submit">Apply filters</button>

          </form>
        </aside>

        <!-- Results -->
        <section class="results">
          <div class="results-grid" id="resultsGrid" aria-live="polite"></div>
        </section>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 REIA Motors • Aruba</p>
    <ul>
      <li><a href="browse.html">Inventory</a></li>
      <li><a href="index2.html#sell-form">Sell your car</a></li>
      <li><a href="index2.html#contact">Contact</a></li>
    </ul>
  </footer>

  <script>
    // Mobile nav burger
    const burger = document.getElementById("navBurger");
    const mobileNav = document.getElementById("navMobile");
    burger.addEventListener("click", () => {
      const open = mobileNav.classList.toggle("open");
      burger.setAttribute("aria-expanded", String(open));
    });
    mobileNav.querySelectorAll("a").forEach(a => {
      a.addEventListener("click", () => {
        mobileNav.classList.remove("open");
        burger.setAttribute("aria-expanded", "false");
      });
    });
  </script>

  <script src="browse.js"></script>
</body>
</html>
