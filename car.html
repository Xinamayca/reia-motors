<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car — REIA Motors</title>
  <meta name="description" content="Vehicle details — REIA Motors Aruba" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="browse.css" /> <!-- optional: keeps same card/button styles -->
  <link rel="stylesheet" href="car.css" />     <!-- new: detail page styles -->
</head>

<body>
  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">REIA</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html">Browse Cars</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <button class="nav-burger" id="navToggle" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav-mobile" id="mobileNav">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse Cars</a>
    <a href="about.html">About</a>
    <a href="index.html#contact">Contact</a>
  </div>

  <main class="page">
    <div class="container">

      <div class="crumbs">
        <a href="browse.html">← Back to Browse</a>
      </div>

      <!-- Loading / error -->
      <div id="state" class="state">Loading car…</div>

      <!-- Detail -->
      <section id="carWrap" class="car-wrap" hidden>
        <div class="car-media">
          <div class="car-image">
            <img id="carImage" src="" alt="" />
          </div>
        </div>

        <div class="car-info">
          <div class="car-top">
            <h1 id="carTitle"></h1>
            <div id="carPrice" class="car-price"></div>
          </div>

          <div class="car-specs" id="carSpecs"></div>

          <div class="car-actions">
            <a id="btnWhatsapp" class="btn btn-primary" target="_blank" rel="noreferrer">WhatsApp about this car</a>
            <a class="btn btn-secondary" href="browse.html">Browse more</a>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="car.js"></script>
</body>
</html>
